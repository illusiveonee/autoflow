:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --navy:#0F2744;
  --navy-mid:#1A3A5C;
  --navy-light:#E8EEF5;
  --text:#1A1A1A;
  --mid:#4A5568;
  --faint:#94A3B8;
  --line:#E2DDD6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;}
::selection{background:var(--navy);color:#fff;}
a{color:inherit;text-decoration:none;}
.mono{font-family:'JetBrains Mono',monospace;}
.wrap{max-width:1100px;margin:0 auto;padding:0 28px;}

/* ─── FIX SHAKING ─── */
.hero { min-height: 600px; }
.hero-inner { min-height: 450px; }
.demo-panels { min-height: 400px; }
.ticker-wrap { height: 50px; display: flex; align-items: center; overflow: hidden; position: relative; }

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--line);
  padding:0 28px;
}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:20px 0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:16px;height:16px;fill:#fff;}
.logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;letter-spacing:.02em;}
.nav-links{display:flex;align-items:center;gap:28px;font-size:14px;font-weight:500;color:var(--mid);}
.nav-links a{transition:color .15s;}
.nav-links a:hover{color:var(--text);}
.nav-cta{background:var(--navy);color:#fff;padding:11px 22px;border-radius:4px;font-weight:600;transition:opacity .15s;}
.nav-cta:hover{opacity:.85;}
@media(max-width:640px){.nav-hide{display:none;}}

/* HERO */
.hero{padding:72px 0 56px;}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;}
@media(max-width:860px){.hero-inner{grid-template-columns:1fr;}}

.live-dot{width:7px;height:7px;border-radius:50%;background:var(--navy-mid);display:inline-block;animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
h1{font-family:'Playfair Display',serif;font-size:clamp(36px,4.5vw,52px);font-weight:500;line-height:1.08;letter-spacing:-.01em;margin-bottom:20px;}
h1 em{font-style:italic;}
.hero-sub{color:var(--mid);font-size:17px;max-width:44ch;line-height:1.65;margin-bottom:28px;}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;}
