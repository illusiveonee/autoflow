<!-- Two charts – Revenue on top (larger), Prospect discovery below -->
<div class="chart-card" style="margin-bottom:24px;min-height:280px;">
  <div class="chart-header">
    <div class="chart-title">Revenue History (last 12 months)</div>
    <span style="font-size:12px;color:var(--faint);">Monthly Recurring Revenue</span>
  </div>
  <canvas id="revenueChart" height="160"></canvas>
</div>

<div class="chart-card" style="margin-bottom:24px;min-height:200px;">
  <div class="chart-header">
    <div class="chart-title">Prospect Discovery (last 30 days)</div>
    <span style="font-size:12px;color:var(--faint);">New prospects found</span>
  </div>
  <canvas id="prospectChart" height="100"></canvas>
</div>
